<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <style>
      body {
        background: linear-gradient(to right, #4e4cff, #3a38d1);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .wrapper {
        display: flex;
        gap: 60px;
        align-items: flex-start;
      }

      .card {
        width: 350px;
        border-radius: 15px;
        padding: 25px;
      }

      .login-card {
        margin-top: 110px;
      }

      .input-box {
        display: flex;
        align-items: center;
        border-bottom: 1px solid #aaa;
        margin-bottom: 25px;
        padding-bottom: 5px;
      }

      .input-box input {
        border: none;
        outline: none;
        width: 100%;
        padding-left: 10px;
        background: transparent;
      }

      .input-box i {
        color: #555;
      }

      .eye {
        cursor: pointer;
      }

      .form-title span {
        border-bottom: 3px solid #4e4cff;
      }

      .btn-primary {
        background-color: #4e4cff;
        border: none;
      }

      .btn-primary:hover {
        background-color: #3a38d1;
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <!-- LOGIN -->
      <div class="card shadow login-card">
        <h4 class="fw-bold mb-4 form-title"><span>Lo</span>gin</h4>

        <div class="input-box">
          <i class="bi bi-envelope"></i>
          <input type="email" placeholder="Enter your email" />
        </div>

        <div class="input-box">
          <i class="bi bi-lock"></i>
          <input type="password" placeholder="Enter your password" />
          <i class="bi bi-eye eye"></i>
        </div>

        <div class="d-flex justify-content-between mb-3">
          <div><input type="checkbox" /> <small>Remember me</small></div>
          <a href="#" class="small">Forget Password</a>
        </div>

        <button class="btn btn-primary w-100 shadow rounded-3">
          Login now
        </button>

        <p class="text-center mt-3 small">
          Don't have an account? <a href="#">Sign up</a>
        </p>
      </div>

      <!-- REGISTER -->
      <div class="card shadow">
        <h4 class="fw-bold mb-4 form-title"><span>Re</span>gistration</h4>

        <div class="input-box">
          <i class="bi bi-person"></i>
          <input type="text" placeholder="Enter your name" />
        </div>

        <div class="input-box">
          <i class="bi bi-envelope"></i>
          <input type="email" placeholder="Enter your mail" />
        </div>

        <div class="input-box">
          <i class="bi bi-lock"></i>
          <input type="password" placeholder="Create your password" />
        </div>

        <div class="input-box">
          <i class="bi bi-lock"></i>
          <input type="password" placeholder="Confirm your password" />
          <i class="bi bi-eye eye"></i>
        </div>

        <div class="mb-3">
          <input type="checkbox" /> <small>I accept all terms</small>
        </div>

        <button class="btn btn-primary w-100 shadow rounded-3">
          Register now
        </button>

        <p class="text-center mt-3 small">
          Already have an account? <a href="#">Login now</a>
        </p>
      </div>
    </div>
    <!-- BootStrap Script  -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cravings</title>
    <!-- csslink -->
    <link rel="stylesheet" href="style.css" />
    <!-- bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"

      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link
      rel="stylesheet"
      href=" https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />

  <body>
    <nav>
      <div
        class="containe bg-primary-custom d-flex align-items-center justify-content-between w-100 nav_height py-4"
      >
        <div class="logo object-fit-contain px-4">
          <a href="./index.html"></a>
          <img src="./image.png" alt="" />
        </div>
        <div class="buttons px-5 d-flex gap-3">
          <button class="login btn text-light py-0 px-3">Login</button>
          <button class="register btn bg-light text-primary-custom">

          </button>
        </div>
      </div>
    </nav>

    <div class="hero">
      <div class="imgpart">
        <img src="./home-png.jpg" class="imgg w-100 position-absolute" alt="" />
      </div>
      <div
        class="textpart w-50 position-relative text-light fs-2 d-flex flex-column justify-content-center align-items-center text-center"
      >
        <b class=""
          >Your Favorite Food, <br />
          Delivered Fast</b
        >
        <p class="fs-6">
          Order from thousands of restaurants and get it delivered to your
          doorstep
        </p>
        <div class="btns">
          <button class="signup btn">
            <a href="./signup.html"></a>
            Sign up
          </button>
          <button class="ordernow btn">
            <a href="./order.html"></a>
            Order now
          </button>
        </div>
        <div class="inputbox">
            <i class="bi bi-search"></i>
            <input type="text" name="" id="">
        </div>
        
    


      </div>
    </div>

    <!-- BootStrap Script  -->

    <form>
      <table border="1" cellpadding="5" cellspacing="0">
        <tr>
          <th colspan="4">Registration Form</th>
        </tr>

        <tr>
          <td><label for="sid">Student Name</label></td>
          <td><input type="text" id="sid" placeholder="First Name" /></td>
          <td><input type="text" placeholder="Middle Name" /></td>
          <td><input type="text" placeholder="Last Name" /></td>
        </tr>

        <tr>
          <td><label for="fname">Father's Name</label></td>
          <td>
            <input
              type="text"
              id="fname"
              placeholder="Enter your father's name"
            />
          </td>
          <td><label for="mname">Mother's Name</label></td>
          <td>
            <input
              type="text"
              id="mname"
              placeholder="Enter your mother's name"
            />
          </td>
        </tr>

        <tr>
          <td><label for="dob">Date of Birth</label></td>
          <td><input type="date" id="dob" /></td>
          <td><label>Male</label></td>
          <td>
            <input type="radio" name="gender" /> Male
            <input type="radio" name="gender" /> Female
          </td>
        </tr>

        <tr>
          <td><label>Category</label></td>
          <td>
            <input type="radio" name="cat" /> Gen
            <input type="radio" name="cat" /> OBC
            <input type="radio" name="cat" /> SC/ST
          </td>
          <td><label>Handicapped</label></td>
          <td>
            <input type="radio" name="handi" /> Yes
            <input type="radio" name="handi" /> No
          </td>
        </tr>

        <tr>
          <td><label>Ex-Serviceman</label></td>
          <td>
            <input type="radio" name="ex" /> Yes
            <input type="radio" name="ex" /> No
          </td>
          <td><label>EWS</label></td>
          <td>
            <input type="radio" name="ews" /> Yes
            <input type="radio" name="ews" /> No
          </td>
        </tr>

        <tr>
          <td><label for="email">Email ID</label></td>
          <td><input type="email" id="email" /></td>
          <td><label for="mobile">Mobile No.</label></td>
          <td><input type="text" id="mobile" /></td>
        </tr>

        <tr>
          <td><label for="state">State</label></td>
          <td>
            <select id="state">
              <option>Select any one</option>
              <option>Madhya Pradesh</option>
              <option>Maharashtra</option>
              <option>Delhi</option>
            </select>
          </td>
          <td><label for="city">City</label></td>
          <td>
            <select id="city">
              <option>Select any one</option>
              <option>Bhopal</option>
              <option>Indore</option>
              <option>Mumbai</option>
            </select>
          </td>
        </tr>

        <tr>
          <td><label for="photo">Upload Photo</label></td>
          <td><input type="file" id="photo" /></td>
          <td><label for="sign">Upload Signature</label></td>
          <td><input type="file" id="sign" /></td>
        </tr>

        <tr>
          <td colspan="4" align="center">
            <input type="submit" value="Submit" />
          </td>
        </tr>
      </table>
    </form>

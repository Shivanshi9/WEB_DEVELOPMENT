  <body>
    <body>
      <h2>Application Form</h2>

      <form>
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" />

        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" /><br /><br />

        <label for="date">Date of birth:</label>
        <input type="date" id="date" />

        <label for="age"> Age:</label>
        <input type="number" /><br /><br />

        <label for="gender">Gender:</label>
        <select>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <label for="email">Email Address:</label>
        <input type="email" placeholder="Enter email address" /><br /><br />

        <label for="position">Positions Available:</label>
        <input type="radio" name="position" /> Junior Developer
        <input type="radio" name="position" /> Mid-level Developer
        <input type="radio" name="position" /> Senior Developer<br /><br />

        <label for="languages">Programming Languages:</label>
        <input type="checkbox" /> Java <input type="checkbox" /> JavaScript
        <input type="checkbox" /> Python<br /><br />

        <label for="password">Password:</label>
        <input type="password" />

        <label for="confirm">Confirm Password:</label>
        <input type="password" /><br /><br />

        <input type="submit" value="Submit" />
        <input type="reset" value="Reset" />
      </form>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task6</title>
</head>
<body>
  <h3>Registration Form : Dance Club</h3>

  <form>
    <table border="1" cellpadding="5">

      <tr>
        <td><label for="name">Name:</label></td>
        <td><input type="text" id="name" name="name"></td>
      </tr>

      <tr>
        <td><label>IC No:</label></td>
        <td>
          <input type="text" size="3"> -
          <input type="text" size="3"> -
          <input type="text" size="4">
        </td>
      </tr>

      <tr>
        <td><label for="address">Address:</label></td>
        <td><textarea id="address" rows="4" cols="40"></textarea></td>
      </tr>

      <tr>
        <td><label>Gender:</label></td>
        <td>
          <input type="radio" id="male" name="gender">
          <label for="male">Male</label>

          <input type="radio" id="female" name="gender">
          <label for="female">Female</label>
        </td>
      </tr>

      <tr>
        <td><label>Dance Type:</label></td>
        <td>
          <input type="checkbox" id="zapin">
          <label for="zapin">Zapin</label>

          <input type="checkbox" id="joget">
          <label for="joget">Joget</label>

          <input type="checkbox" id="inang">
          <label for="inang">Inang</label>

          <input type="checkbox" id="lion">
          <label for="lion">Lion Dance</label>
        </td>
      </tr>

      <tr>
        <td><label for="competition">Competition:</label></td>
        <td>
          <select id="competition">
            <option>State Level</option>
            <option>National Level</option>
            <option>International Level</option>
          </select>
        </td>
      </tr>

      <tr>
        <td><label for="nationality">Nationality:</label></td>
        <td>
          <select id="nationality">
            <option>--please select--</option>
            <option>Indian</option>
            <option>Other</option>
          </select>
        </td>
      </tr>

      <tr>
        <td><label for="password">Password:</label></td>
        <td><input type="password" id="password"></td>
      </tr>

      <tr>
        <td colspan="2">
          <input type="submit" value="Register Me">
          <input type="reset" value="Cancel">
        </td>
      </tr>

    </table>
  </form>
</html>

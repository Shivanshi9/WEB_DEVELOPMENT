<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task8</title>
</head>
<body>

<form>
  <fieldset>
    <legend><b>Farewell Party Survey Form</b></legend>

    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter your name"><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter your email"><br><br>

    <label for="age">Age:</label>
    <input type="number" id="age"><br><br>

    <label for="role">Which option best describes you?</label>
    <select id="role">
      <option>Student</option>
      <option>Teacher</option>
      <option>Other</option>
    </select><br><br>

    <label>Will you attend party?</label><br>
    <input type="radio" id="yes" name="attend">
    <label for="yes">Yes</label>

    <input type="radio" id="no" name="attend">
    <label for="no">No</label>
    <br><br>

    <label>What did you like about the program?</label><br>

    <input type="checkbox" id="training">
    <label for="training">Training</label><br>

    <input type="checkbox" id="sessions">
    <label for="sessions">The Learning Sessions from Industry Experts</label><br>

    <input type="checkbox" id="mentors">
    <label for="mentors">Mentorship</label><br>

    <input type="checkbox" id="browsing">
    <label for="browsing">Browse By Sessions</label><br>

    <input type="checkbox" id="hybrid">
    <label for="hybrid">Switching to Hybrid Mode</label><br>

    <input type="checkbox" id="food">
    <label for="food">Food, Office etc.</label>
    <br><br>

    <label for="comments">Any comments or suggestions:</label><br>
    <textarea id="comments" rows="3" cols="30"></textarea>
    <br><br>

    <input type="submit" value="Submit">

  </fieldset>
</form>
</html>

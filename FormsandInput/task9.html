    <form>
      <fieldset>
        <legend><b>Pizza Order Form</b></legend>

        <label for="fname">First Name:</label>
        <input type="text" id="fname" /><br /><br />

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" /><br /><br />

        <label for="email2">Email Address:</label>
        <input type="email" id="email2" /><br /><br />

        <label for="contact">Contact Number:</label>
        <input type="text" id="contact" /><br /><br />

        <label for="delivery">Preferred Delivery Date:</label>
        <input type="date" id="delivery" /><br /><br />

        <label>Pizza Size:</label><br />
        <input type="radio" id="small" name="size" />
        <label for="small">Small</label>

        <input type="radio" id="medium" name="size" />
        <label for="medium">Medium</label>

        <input type="radio" id="large" name="size" />
        <label for="large">Large</label>
        <br /><br />

        <label>Flavor (Qty):</label><br />

        <input type="checkbox" id="hawaiian" />
        <label for="hawaiian">Hawaiian (Php 150.00)</label>
        <input type="number" min="0" max="10" value="0" /><br />

        <input type="checkbox" id="pepperoni" />
        <label for="pepperoni">Pepperoni (Php 140.00)</label>
        <input type="number" min="0" max="10" value="0" /><br />

        <input type="checkbox" id="veg" />
        <label for="veg">Vegetable (Php 130.00)</label>
        <input type="number" min="0" max="10" value="0" /><br /><br />

        <label for="cc">Credit Card Number:</label>
        <input type="text" id="cc" /><br /><br />

        <label for="pin">PIN:</label>
        <input type="password" id="pin" /><br /><br />

        <label for="note">Additional Note:</label><br />
        <textarea id="note" rows="4" cols="35"></textarea>
        <br /><br />

        <input type="submit" value="Submit Order" />
      </fieldset>
    </form>

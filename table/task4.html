<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Nested Table</title>
  </head>
  <body>
    <h1>Task 4:</h1>
    <table border="1" cellspacing="4">
      <tr>
        <th rowspan="2">Heading</th>
        <th>Students</th>
        <th colspan="3">Details</th>
      </tr>

      <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Department</th>
        <th>Roll Number</th>
      </tr>

      <!-- Row 1 -->
      <tr>
        <td rowspan="4">Student List</td>
        <td>1</td>
        <td colspan="3">
          <table border="1" cellspacing="4">
            <tr>
              <td>Victor</td>
              <td>Computer Science</td>
              <td>12345</td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Row 2 -->
      <tr>
        <td>2</td>
        <td colspan="3">
          <table border="1" cellspacing="4">
            <tr>
              <td>Williams</td>
              <td>Electronics</td>
              <td>23456</td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Row 3 -->
      <tr>
        <td>3</td>
        <td colspan="3">
          <table border="1" cellspacing="4">
            <tr>
              <td>Harry</td>
              <td>Electrical</td>
              <td>34567</td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Row 4 -->
      <tr>
        <td>4</td>
        <td colspan="3">
          <table border="1" cellspacing="4">
            <tr>
              <td>Rick</td>
              <td>Civil</td>
              <td>45678</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
    <hr />

    <h5><a href="../index.html">Back to Home</a></h5>
  </body>
</html>
